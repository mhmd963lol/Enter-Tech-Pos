<svg viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- Maskable Icon with Safe Zone (120x120 viewBox with content in center 100x100) -->
    <g transform="translate(10, 10)">
        <!-- Base and Stand -->
        <path d="M40 85 H60 L56 65 H44 Z" fill="#D4D4D8" />
        <path d="M25 90 H75 A3 3 0 0 1 75 96 H25 A3 3 0 0 1 25 90 Z" fill="#A1A1AA" />

        <!-- Monitor Screen Frame -->
        <rect x="15" y="20" width="70" height="50" rx="4" fill="#27272A" />
        <!-- Inner Screen -->
        <rect x="20" y="25" width="60" height="40" rx="2" fill="#F4F4F5" />

        <!-- Chart Line (Upward Trend) -->
        <path d="M25 55 L40 35 L55 45 L75 25" stroke="#00E676" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
        <!-- Chart Nodes -->
        <circle cx="75" cy="25" r="4" fill="#00E676" />
        <circle cx="55" cy="45" r="3" fill="#00E676" />
        <circle cx="40" cy="35" r="3" fill="#00E676" />

        <!-- Receipt popping out -->
        <path d="M75 10 H85 V30 L80 25 L75 30 V10 Z" fill="#FFFFFF" stroke="#D4D4D8" stroke-width="1" stroke-linejoin="round" />
        <line x1="77" y1="15" x2="83" y2="15" stroke="#A1A1AA" stroke-width="1.5" stroke-linecap="round" />
        <line x1="77" y1="20" x2="83" y2="20" stroke="#A1A1AA" stroke-width="1.5" stroke-linecap="round" />

        <!-- Barcode Scanner -->
        <path d="M10 50 Q18 45, 12 60 L8 75 A4 4 0 0 0 16 78 L25 55 Q20 48, 10 50 Z" fill="#3F3F46" />
        <!-- Scanner Button -->
        <rect x="6" y="44" width="14" height="8" rx="2" fill="#00E676" />
        <!-- Laser beam -->
        <line x1="13" y1="44" x2="25" y2="20" stroke="#00E676" stroke-width="2" stroke-linecap="round" stroke-dasharray="2 4" />
    </g>
</svg>
